# Caller workflow — copy to `.github/workflows/ff-merge.yaml` in a consuming repo.
#
# This is the only per-repo boilerplate. It owns the trigger and a cheap
# first-pass gate; all authoritative checks happen in the reusable workflow.
#
# Trigger: a maintainer comments `/merge` on the PR. issue_comment runs in the
# base-repo context, so secrets are available even for fork PRs.
#
# Prerequisites (one-time, org-wide — see ff-merge/README.md):
#   - org variable FF_MERGE_CLIENT_ID and org secret FF_MERGE_PRIVATE_KEY
#   - the "FF Merge" App installed on this repo and in the ruleset bypass list

name: Fast-forward merge

on:
  issue_comment:
    types: [created]

jobs:
  fast-forward:
    # Cheap gate: a /merge comment on a PR from someone in the org. The reusable
    # workflow re-verifies write access authoritatively, so this only filters noise.
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == '/merge' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    # Pin @v1 to a release tag or full commit SHA — see README "Pinning".
    uses: bitwise-media-group/ff-merge/.github/workflows/ff-merge.yaml@v1
    with:
      pr-number: ${{ github.event.issue.number }}
      client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
