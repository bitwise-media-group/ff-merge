version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - actions/*
      github:
        patterns:
          - github/*
      bitwise-media-group:
        patterns:
          - bitwise-media-group/*

  # The shared Makefile library (bitwise-media-group/make) included at make/ via
  # the node-action archetype. Track the submodule so a library release (a new
  # `release` branch head) flows here as a bump.
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      # our own toolchain submodule (.mise/) ships straight through — no cooldown wait
      exclude:
        - .mise
    commit-message:
      include: scope
      prefix: build
      prefix-development: build
