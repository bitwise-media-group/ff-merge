# This repo's caller for the reusable review-ack workflow. It completes on an approving
# review so its workflow_run re-enters merge.yaml's review-completed path in base context
# -- the path that lets a fork PR auto-merge promptly when the approval lands after CI is
# already green. No secret needed; the completed run is the only signal.
#
# "Merge Review Ack" is listed in merge.yaml's workflow_run.workflows so its completion
# turns an approval into a merge attempt.
#
# Pinned to a full commit SHA; Dependabot keeps the pin fresh.
name: Merge Review Ack

on:
  pull_request_review:
    types: [submitted]

# does no privileged work; grants nothing
permissions: {}

jobs:
  ack:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge-review-ack.yaml@ee856f73ecea9b0c2c989d3a6aa585774b0d2a38 # v5.0.0
