# This repo's caller for the reusable merge-notice workflow. When a PR is opened it posts
# a one-time comment explaining this repo merges via `/merge` (see merge.yaml).
#
# pull_request_target (not pull_request) so the notice also reaches fork PRs; the reusable
# workflow only posts a static comment with a pull-requests:write token, so the elevated
# context is safe. No secret needed.
#
# Pinned to a full commit SHA; Dependabot keeps the pin fresh.
name: Merge Notice

on:
  pull_request_target:
    types: [opened]

# the reusable workflow comments with GITHUB_TOKEN; grant just that
permissions:
  pull-requests: write

jobs:
  notice:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge-notice.yaml@83b83722f4120b368e100e3b4a4af359522578c0 # v4.0.3
    with:
      pr-number: ${{ github.event.pull_request.number }}
