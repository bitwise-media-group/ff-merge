# This repo's caller for the reusable merge workflow -- ff-merge dogfoods the merge flow
# it powers. A maintainer comments `/merge` to fast-forward an approved, green PR now, or
# arms auto-merge (`/auto-merge` comment or the `auto-merge` label) to merge it
# automatically once approved and green. Both run the published ff-merge action, so every
# commit keeps its signature.
#
# Every trigger is one that does NOT attach a check run to the PR (issue_comment,
# workflow_run, schedule), so no skipped-job clutter lands on the PR's checks list. The
# workflow_run list names every check that must be green -- "Continuous Integration" and
# "Security Analysis" -- plus "Merge Review Ack", whose completion turns an approval into
# a merge attempt; whichever finishes last triggers it, and ff-merge re-verifies all
# checks before moving the ref.
#
# Org prerequisites (see README): the FF_MERGE_CLIENT_ID variable + FF_MERGE_PRIVATE_KEY
# secret, and the "FF Merge" App in main's ruleset bypass list.
#
# Pinned to a full commit SHA; Dependabot keeps the pin fresh.
name: Merge

on:
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["Continuous Integration", "Security Analysis", "Merge Review Ack"]
    types: [completed]
  schedule:
    - cron: "17 * * * *"

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge.yaml@ee856f73ecea9b0c2c989d3a6aa585774b0d2a38 # v5.0.0
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
