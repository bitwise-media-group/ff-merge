# Caller for the reusable CI workflow. It owns the push/pull_request triggers; the work
# runs in github-workflows/ci.yaml, which runs the canonical Makefile gates (make lint /
# build / test) as one job each and sets up the toolchains the repo has (package.json ->
# node here). `make build` regenerates dist/ and the reusable workflow fails the run if
# the committed bundle doesn't reproduce from src/.
#
# Pinned to a full commit SHA; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@a28e6738bc4f912322f9e66e9e90e7de789c4ad3 # v4.3.1
