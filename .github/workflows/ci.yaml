# Lint, typecheck, unit tests with coverage, a fresh build, and a
# dist-reproducibility gate: the committed dist/ must match a build from src/.
# There is no e2e here — running the action for real would move a branch ref —
# so the gating logic is covered by the unit table in __tests__/ instead.
name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# granted per job
permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      # check out the repository
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      # The bundle consumers run is the one in git: a dist/ that does not
      # reproduce from src/ is either a stale build or a tampered artifact.
      - name: Verify dist/ is up to date
        run: git diff --exit-code -- dist
      # Hand the Cobertura report to the coverage job, which holds the
      # CODECOV_TOKEN secret. Forked PRs don't receive secrets, so skip there.
      - name: Upload coverage artifact
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/cobertura-coverage.xml
          if-no-files-found: error

  # Uploads the Cobertura report to Codecov. Split out from `check` so the
  # CODECOV_TOKEN secret is never present in the job that runs PR-supplied code
  # (npm install scripts, test code).
  coverage:
    needs: check
    if:
      ${{ !cancelled() && needs.check.result == 'success' && (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      # download artifacts
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # the artifact holds only this one file; don't let the action walk the tree
          files: cobertura-coverage.xml
          disable_search: true
          fail_ci_if_error: true
