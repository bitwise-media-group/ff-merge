# This repo's caller for the reusable Dependabot auto-merge workflow. When a Dependabot
# PR's checks finish green, the reusable workflow approves it if it is a minor or patch
# update and fast-forwards it via the ff-merge action (major updates wait for a human).
#
# Just workflow_run: no pull_request_target and no skipped-job clutter on the PR. The
# workflow_run list names every check that must be green -- "Continuous Integration" and
# "Security Analysis"; whichever finishes last triggers the merge attempt.
#
# Requires .github/dependabot.yaml (present) and the same org prerequisites as merge.yaml.
#
# Pinned to a full commit SHA; Dependabot keeps the pin fresh.
name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows: ["Continuous Integration", "Security Analysis"]
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/dependabot-merge.yaml@3636c830f0b00c591f8b27401c45786d08466f18 # v6.0.0
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
